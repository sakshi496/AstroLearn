<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroLearn - Full</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
      color: white;
      margin: 0;
    }
    header {
      text-align: center;
      padding: 30px;
      background-color: #000;
      font-size: 2.5em;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #111;
      padding: 15px;
      font-size: 1.1em;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 5px;
      transition: 0.3s;
    }
    nav a:hover {
      background-color: #0077cc;
    }
    section {
      padding: 40px 20px;
    }
    .planet-list {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .planet {
      background-color: #1f2a38;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      transition: transform 0.3s, background-color 0.3s;
    }
    .planet:hover {
      background-color: #30465b;
      transform: scale(1.05);
    }
    .planet img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }
    .info-box {
      max-width: 600px;
      margin: 30px auto;
      background-color: #16222A;
      padding: 20px;
      border-radius: 12px;
      display: none;
    }
    .info-box h2 {
      color: #00d2ff;
    }
.quiz-box, .chat-box {
  max-width: 700px;
  margin: auto;
  background: linear-gradient(145deg, #112233, #0c192c);
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 0 18px rgba(0,0,0,0.5);
  transition: all 0.3s ease;
}
.quiz-box:hover, .chat-box:hover {
  transform: scale(1.02);
}
.chat-input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #0077cc;
  background-color: #0f2438;
  color: #fff;
}
.chat-input:focus {
  outline: none;
  border-color: #00bfff;
  box-shadow: 0 0 10px #00bfff44;
}
button {
  margin: 8px 5px;
  padding: 12px 18px;
  font-size: 1em;
  background-color: #00aaff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,170,255,0.3);
}
button:hover {
  background-color: #008ecc;
  box-shadow: 0 0 12px rgba(0,170,255,0.5);
}
#feedback {
  margin-top: 15px;
  font-size: 1.1em;
  font-weight: bold;
  color: #00ffcc;
}

  </style>
</head>
<body>
  <header>AstroLearn - Explore the Universe</header>
  <nav>
    <a href="#explorer">Planet Explorer</a>
    <a href="#simulator">Simulator</a>
    <a href="#quiz">Quiz</a>
    <a href="#chat">AI Chat</a>
  </nav>

  <section id="explorer">
    <h2 style="text-align:center;">Planet Explorer</h2>
    <div class="planet-list" id="planetList"></div>
    <div class="info-box" id="infoBox">
      <h2 id="planetName"></h2>
      <p><strong>Distance from Sun:</strong> <span id="distance"></span> million km</p>
      <p><strong>Gravity:</strong> <span id="gravity"></span> m/s²</p>
      <p><strong>Moons:</strong> <span id="moons"></span></p>
      <p><strong>Description:</strong> <span id="description"></span></p>
    </div>
  </section>  <section id="simulator">
    <h2 style="text-align:center;">Solar System Simulator</h2>
    <div class="simulator" style="position:relative; height:400px; background:#02141f; border-radius:20px;">
      <div class="sun" style="width:80px; height:80px; background:radial-gradient(circle, yellow, orange); border-radius:50%; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 40px yellow;"></div>
      <div class="orbit" style="width: 120px; height: 120px; position:absolute; border:1px dashed rgba(255,255,255,0.2); border-radius:50%; top:50%; left:50%; transform:translate(-50%, -50%)">
        <div class="planet-anim" id="p1" style="width:20px;height:20px;background:skyblue;border-radius:50%;position:absolute;top:50%;left:50%;"></div>
      </div>
      <div class="orbit" style="width: 180px; height: 180px; position:absolute; border:1px dashed rgba(255,255,255,0.2); border-radius:50%; top:50%; left:50%; transform:translate(-50%, -50%)">
        <div class="planet-anim" id="p2" style="width:20px;height:20px;background:skyblue;border-radius:50%;position:absolute;top:50%;left:50%;"></div>
      </div>
      <div class="orbit" style="width: 240px; height: 240px; position:absolute; border:1px dashed rgba(255,255,255,0.2); border-radius:50%; top:50%; left:50%; transform:translate(-50%, -50%)">
        <div class="planet-anim" id="p3" style="width:20px;height:20px;background:skyblue;border-radius:50%;position:absolute;top:50%;left:50%;"></div>
      </div>
      <div class="orbit" style="width: 300px; height: 300px; position:absolute; border:1px dashed rgba(255,255,255,0.2); border-radius:50%; top:50%; left:50%; transform:translate(-50%, -50%)">
        <div class="planet-anim" id="p4" style="width:20px;height:20px;background:skyblue;border-radius:50%;position:absolute;top:50%;left:50%;"></div>
      </div>
    </div>
  </section>

  <section id="quiz">
    <div class="quiz-box">
      <h2>Space Quiz</h2>
      <p id="question"></p>
      <div id="answers"></div>
      <p id="feedback"></p>
    </div>
  </section>
  <section id="chat">
    <div class="chat-box">
      <h2>AI Space Assistant</h2>
      <input class="chat-input" placeholder="Ask about planets..." onkeydown="if(event.key==='Enter') chatReply(this.value)">
      <p id="chatResponse"></p>
    </div>
  </section>

  <script>
    // Planet Explorer Data
    const planets = [
      { name: "Mercury", distance: 57.9, gravity: 3.7, moons: 0, desc: "Closest to the Sun.", img: "https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg" },
      { name: "Venus", distance: 108.2, gravity: 8.87, moons: 0, desc: "Hot and toxic atmosphere.", img: "https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg" },
      { name: "Earth", distance: 149.6, gravity: 9.8, moons: 1, desc: "Our home planet.", img: "https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg" },
      { name: "Mars", distance: 227.9, gravity: 3.71, moons: 2, desc: "The Red Planet.", img: "https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg" },
      { name: "Jupiter", distance: 778.5, gravity: 24.79, moons: 79, desc: "The largest planet.", img: "https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg" },
      { name: "Saturn", distance: 1434, gravity: 10.44, moons: 82, desc: "Famous for its rings.", img: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg" },
      { name: "Uranus", distance: 2871, gravity: 8.69, moons: 27, desc: "An ice giant.", img: "https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg" },
      { name: "Neptune", distance: 4495, gravity: 11.15, moons: 14, desc: "Farthest from the Sun.", img: "https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg" }
    ];

    const planetList = document.getElementById("planetList");
    const infoBox = document.getElementById("infoBox");

    planets.forEach(planet => {
      const div = document.createElement("div");
      div.className = "planet";
      div.innerHTML = `<img src="${planet.img}" alt="${planet.name}"/><div>${planet.name}</div>`;
      div.onclick = () => {
        document.getElementById("planetName").textContent = planet.name;
        document.getElementById("distance").textContent = planet.distance;
        document.getElementById("gravity").textContent = planet.gravity;
        document.getElementById("moons").textContent = planet.moons;
        document.getElementById("description").textContent = planet.desc;
        infoBox.style.display = "block";
        infoBox.scrollIntoView({ behavior: "smooth" });
      };
      planetList.appendChild(div);
    });

    // Orbit Animation
    function animateOrbit(id, radius, speed) {
      const el = document.getElementById(id);
      let angle = 0;
      setInterval(() => {
        const rad = angle * Math.PI / 180;
        el.style.transform = `translate(${radius * Math.cos(rad)}px, ${radius * Math.sin(rad)}px)`;
        angle = (angle + speed) % 360;
      }, 30);
    }
    animateOrbit('p1', 60, 2);
    animateOrbit('p2', 90, 1.6);
    animateOrbit('p3', 120, 1.2);
    animateOrbit('p4', 150, 1);

    // Quiz
    const questions = [
      { q: "Which planet is known as the Red Planet?", a: ["Mars", "Jupiter", "Venus"], c: 0 },
      { q: "Which planet has the most moons?", a: ["Saturn", "Earth", "Mars"], c: 0 },
      { q: "What is the hottest planet in our solar system?", a: ["Mercury", "Venus", "Mars"], c: 1 },
      { q: "Which is the smallest planet?", a: ["Mercury", "Mars", "Pluto"], c: 0 },
      { q: "Which planet has a big red spot?", a: ["Jupiter", "Neptune", "Saturn"], c: 0 }
    ];
    let current = 0;
    function loadQuiz() {
      document.getElementById('question').textContent = questions[current].q;
      document.getElementById('answers').innerHTML = questions[current].a.map((ans, i) =>
        `<button onclick="checkAnswer(${i})">${ans}</button>`).join('');
      document.getElementById('feedback').textContent = '';
    }
    function checkAnswer(index) {
      const correct = questions[current].c;
      document.getElementById('feedback').textContent =
        index === correct ? "✅ Correct!" : "❌ Try again.";
      current = (current + 1) % questions.length;
      setTimeout(loadQuiz, 1000);
    }
    loadQuiz();

    // Chatbot
    function chatReply(input) {
      const text = input.toLowerCase();
      let response = "I'm not sure about that!";
      if (text.includes("jupiter")) response = "Jupiter is the largest planet in our solar system!";
      else if (text.includes("sun")) response = "The Sun is a star at the center of our solar system.";
      else if (text.includes("earth")) response = "Earth is the third planet from the Sun and supports life.";
      else if (text.includes("mars")) response = "Mars is known as the Red Planet due to its iron oxide surface.";
      else if (text.includes("moons")) response = "Saturn currently has the most known moons!";
      document.getElementById("chatResponse").textContent = response;
    }
  </script>
</body>
</html>
